let activeModule = null;

function renderNav() {
  const nav = document.getElementById('moduleNav');
  nav.innerHTML = MODULES.map(m => `
    <div class="module-card" data-id="${m.id}" style="--mc:${m.color};--mc-glow:${m.glow}" onclick="selectModule(${m.id})">
      <div class="mod-num">${m.num}</div>
      <div class="mod-title">${m.title}</div>
      <div class="mod-meta">${m.lessons}节课 · ${m.duration}</div>
    </div>
  `).join('');
}

function selectModule(id) {
  activeModule = id;
  document.querySelectorAll('.module-card').forEach(c => c.classList.toggle('active', +c.dataset.id === id));
  const m = MODULES.find(m => m.id === id);
  const area = document.getElementById('contentArea');
  area.style.setProperty('--mc', m.color);
  area.style.setProperty('--mc-glow', m.glow);

  area.innerHTML = `
    <div class="module-view">
      <div class="mv-header">
        <div class="mv-num" style="color:${m.color}">${m.num}</div>
        <div class="mv-title">${m.title}</div>
        <div class="mv-desc">${m.desc}</div>
      </div>
      <div class="lesson-grid">
        ${m.items.map((it, i) => `
          <div class="lesson-card" style="--mc:${m.color};--mc-glow:${m.glow}">
            <div class="lc-num">${m.num.replace('模块','')}.${i+1}</div>
            <div class="lc-title">${it.t}</div>
            <ul class="lc-points">
              ${it.pts.map(p => `<li>${p}</li>`).join('')}
            </ul>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  area.scrollTop = 0;
}

// ---- Starfield ----
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, stars = [], connections = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.01,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, W, H);

  // Draw connections
  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 100) {
        ctx.beginPath();
        ctx.moveTo(stars[i].x, stars[i].y);
        ctx.lineTo(stars[j].x, stars[j].y);
        ctx.strokeStyle = `rgba(79,195,247,${0.08 * (1 - d/100)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // Draw stars
  for (const s of stars) {
    s.a += s.da;
    if (s.a > 1 || s.a < 0.2) s.da = -s.da;
    s.x += s.vx;
    s.y += s.vy;
    if (s.x < 0) s.x = W;
    if (s.x > W) s.x = 0;
    if (s.y < 0) s.y = H;
    if (s.y > H) s.y = 0;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${s.a})`;
    ctx.fill();
  }

  requestAnimationFrame(drawStars);
}

// Shooting star
function shootStar() {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  el.style.top = Math.random() * H * 0.5 + 'px';
  el.style.left = Math.random() * W * 0.6 + 'px';
  el.style.transform = `rotate(${30 + Math.random()*20}deg)`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

setInterval(() => { if (Math.random() > 0.6) shootStar(); }, 3000);

window.addEventListener('resize', () => { resize(); initStars(); });
resize();
initStars();
drawStars();
renderNav();
</script>
